name: face-recognition-infra

networks:
  face-infra:
    name: face-infra
    driver: bridge

volumes:
  sqlserver_data:
  redis_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:

x-common: &common
  restart: unless-stopped
  networks:
    - face-infra

services:

  # ── SQL Server ──────────────────────────────────────────────────────────────
  sqlserver:
    <<: *common
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: infra-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_PID: Developer
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./init/sqlserver:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${MSSQL_SA_PASSWORD}' -No -Q 'SELECT 1'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          # SQL Server minimum 2GB
          memory: 2g
          cpus: "1.0"

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    <<: *common
    image: redis:7-alpine
    container_name: infra-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 300m
          cpus: "0.5"

  # ── RabbitMQ (Message Queue for async face processing) ───────────────────
  rabbitmq:
    <<: *common
    image: rabbitmq:3-management-alpine
    container_name: infra-rabbitmq
    hostname: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./config/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    ports:
      - "127.0.0.1:5672:5672"   # AMQP
      - "127.0.0.1:15672:15672" # Management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  # ── Prometheus (Metrics collector) ──────────────────────────────────────────
  prometheus:
    <<: *common
    image: prom/prometheus:latest
    container_name: infra-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    volumes:
      - prometheus_data:/prometheus
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "127.0.0.1:9090:9090"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  # ── Grafana (Metrics dashboard) ──────────────────────────────────────────────
  grafana:
    <<: *common
    image: grafana/grafana:latest
    container_name: infra-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
